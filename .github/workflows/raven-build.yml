name: Raven Build

# dispatch_id in the run name lets the Raven image-build plugin correlate the
# run it triggered (it substring-matches dispatch_id against run names).
run-name: >-
  raven-build ${{ inputs.image_tag || github.sha }}${{ inputs.dispatch_id && format(' [dispatch:{0}]', inputs.dispatch_id) || '' }}

# On-demand image build driven by the Raven image-build plugin
# (ctx.plugin("image-build.trigger_build", ...)). Both inputs MUST be declared
# or GitHub rejects the dispatch with 422 "unexpected inputs".
on:
  workflow_dispatch:
    inputs:
      dispatch_id:
        description: "Correlation id injected by the Raven image-build plugin"
        required: false
        default: ""
      image_tag:
        description: "Tag to publish under (empty = dispatch-<sha8>)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        # image_tag is caller-controlled; pass via env (never interpolate
        # ${{ inputs.* }} into the script) to avoid shell injection.
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          tag="$INPUT_IMAGE_TAG"
          if [ -z "$tag" ]; then
            tag="dispatch-${GITHUB_SHA::8}"
          fi
          if [[ ! "$tag" =~ ^[A-Za-z0-9_][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "::error::image_tag must be a valid Docker tag; got '$tag'"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The puller host runs docker 1.13.1, which predates OCI manifests and can
      # only pull Docker schema-2 images. buildx's default OCI/provenance output
      # is unpullable there ("image not found"), so build with the legacy builder
      # (DOCKER_BUILDKIT=0) + classic `docker push`, which emit a schema-2
      # manifest. Single-arch linux/amd64 matches the puller host (x86_64).
      - name: Build and push (schema-2 for the old-docker puller)
        env:
          DOCKER_BUILDKIT: "0"
        run: |
          img="ghcr.io/${{ github.repository_owner }}/raven-app:${{ steps.tag.outputs.tag }}"
          docker build -t "$img" .
          docker push "$img"
          echo "Pushed $img"
